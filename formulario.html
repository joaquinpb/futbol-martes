<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Estadísticas Fútbol Martes</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
      max-width: 600px;
      margin: auto;
    }
    label {
      font-weight: bold;
      margin-top: 1rem;
      display: block;
    }
    select {
      width: 100%;
      height: 200px;
      margin-bottom: 1rem;
    }
    button {
      padding: 0.5rem 1rem;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>Formulario de Partido</h1>

  <form id="matchForm">
    <label for="darkTeam">Equipo Oscuro</label>
    <select id="darkTeam" name="darkTeam" multiple></select>

    <label for="lightTeam">Equipo Claro</label>
    <select id="lightTeam" name="lightTeam" multiple></select>

    <button type="submit">Guardar</button>
  </form>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const players = [
        "Juan", "Pedro", "Luis", "Carlos", "Martín", "Nico", "Lucas", "Andrés", "Tomás", "Esteban",
        "Leo", "Julián", "Sebastián", "Emilio", "Franco", "Ramiro", "Agustín", "Ezequiel", "Bruno", "Diego",
        "Federico", "Gastón", "Iván", "Matías", "Pablo", "Rodrigo", "Santiago", "Ulises", "Valentín", "Walter"
      ];

      const darkTeamSelect = document.getElementById("darkTeam");
      const lightTeamSelect = document.getElementById("lightTeam");

      players.forEach(name => {
        const optionDark = document.createElement("option");
        optionDark.value = name;
        optionDark.textContent = name;
        darkTeamSelect.appendChild(optionDark);

        const optionLight = document.createElement("option");
        optionLight.value = name;
        optionLight.textContent = name;
        lightTeamSelect.appendChild(optionLight);
      });

      document.getElementById("matchForm").addEventListener("submit", function (e) {
        e.preventDefault();

        const darkTeam = Array.from(darkTeamSelect.selectedOptions).map(opt => opt.value);
        const lightTeam = Array.from(lightTeamSelect.selectedOptions).map(opt => opt.value);

        fetch("https://script.google.com/macros/s/AKfycbxNs1vmT3asNMgvKiLRz7gVk1wJQwFr_JD0ZU05iaeyvrfJm17ZyU6SZON52Bxv4927/exec", {
          method: "POST",
          body: JSON.stringify({
            equipoOscuro: darkTeam,
            equipoClaro: lightTeam
          }),
          headers: {
            "Content-Type": "application/json"
          }
        })
        .then(res => res.text())
        .then(msg => {
          alert("Guardado correctamente en Google Sheets");
          darkTeamSelect.selectedIndex = -1;
          lightTeamSelect.selectedIndex = -1;
        })
        .catch(err => {
          alert("Error al guardar");
          console.error(err);
        });
      });
    });
  </script>
</body>
</html>
