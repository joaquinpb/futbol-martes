<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol 5 - Administrador de Partidos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Administrador de Partidos</h1>
        <p><a href="index.html">Ir a Crear Partido</a> | <a href="resultados.html">Ir a Registrar Resultados</a> | <a href="puntuaciones.html">Ver Tabla de Puntos</a></p>

        <label for="seleccionarPartidoAdmin">Seleccionar Partido para Administrar:</label>
        <select id="seleccionarPartidoAdmin" onchange="cargarDetallesPartidoAdmin()">
            <option value="">Selecciona un partido...</option>
        </select>

        <div id="adminForm" style="display: none;">
            <h2>Editar Partido</h2>
            <label for="fechaPartidoAdmin">Fecha del Partido:</label>
            <input type="date" id="fechaPartidoAdmin" required>

            <div class="team-details-container">
                <div>
                    <h3>Equipo Claros</h3>
                    <textarea id="equipoClarosAdmin" rows="5"></textarea>
                </div>
                <div>
                    <h3>Equipo Oscuros</h3>
                    <textarea id="equipoOscurosAdmin" rows="5"></textarea>
                </div>
            </div>

            <h2>Resultado Actual</h2>
            <input type="radio" id="ganadorClarosAdmin" name="ganadorAdmin" value="Claros">
            <label for="ganadorClarosAdmin">Ganaron Claros</label><br>
            <input type="radio" id="ganadorOscurosAdmin" name="ganadorAdmin" value="Oscuros">
            <label for="ganadorOscurosAdmin">Ganaron Oscuros</label><br>
            <input type="radio" id="empateAdmin" name="ganadorAdmin" value="Empate">
            <label for="empateAdmin">Empate</label><br>
            <input type="radio" id="pendienteAdmin" name="ganadorAdmin" value="PENDIENTE">
            <label for="pendienteAdmin">PENDIENTE</label><br>

            <button onclick="actualizarPartido()">Guardar Cambios</button>
            <button onclick="eliminarPartido()" class="delete-button">Eliminar Partido</button>
            <p id="mensajeAdmin" class="mensaje"></p>
        </div>
    </div>

    <script src="script.js"></script>
    <!-- Indicador de versión de la aplicación -->
    <div id="appVersion" class="app-version">v0.3</div>
</body>
</html>
