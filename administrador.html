<!DOCTYPE html>
<html lang="es" data-version="1.1">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol 5 - Administrador</title>
    <!-- Enlaza el archivo de estilos CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Administrador de Partidos</h1>
        <!-- Enlaces de navegación -->
        <p>
            <a href="index.html">Ir a Crear Partido</a> |
            <a href="resultados.html">Ir a Registrar Resultados</a> |
            <a href="puntuaciones.html">Ir a Tabla de Puntos</a> |
            <a href="chamigo.html">Ir a Votar Chamigo</a>
        </p>

        <label for="seleccionarPartidoAdmin">Seleccionar Partido a Administrar:</label>
        <select id="seleccionarPartidoAdmin" onchange="cargarDetallesPartidoAdmin()">
            <option value="">Selecciona un partido...</option>
            <!-- Los partidos se cargarán aquí dinámicamente -->
        </select>

        <div id="adminForm" style="display: none;">
            <h2>Detalles del Partido</h2>
            <label for="fechaPartidoAdmin">Fecha del Partido:</label>
            <input type="date" id="fechaPartidoAdmin" required>

            <div class="admin-teams-container">
                <div>
                    <h3>Equipo Claros</h3>
                    <textarea id="equipoClarosAdmin" rows="5"></textarea>
                </div>
                <div>
                    <h3>Equipo Oscuros</h3>
                    <textarea id="equipoOscurosAdmin" rows="5"></textarea>
                </div>
            </div>

            <h3>Ganador</h3>
            <div class="admin-winner-options">
                <div class="radio-option">
                    <input type="radio" id="ganaronClarosAdmin" name="ganadorAdmin" value="Claros">
                    <label for="ganaronClarosAdmin">Ganaron Claros</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="ganaronOscurosAdmin" name="ganadorAdmin" value="Oscuros">
                    <label for="ganaronOscurosAdmin">Ganaron Oscuros</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="empateAdmin" name="ganadorAdmin" value="Empate">
                    <label for="empateAdmin">Empate</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="pendienteAdmin" name="ganadorAdmin" value="PENDIENTE">
                    <label for="pendienteAdmin">PENDIENTE</label>
                </div>
            </div>

            <button onclick="actualizarPartido()">Actualizar Partido</button>
            <button onclick="eliminarPartido()" class="delete-button">Eliminar Partido</button>
        </div>

        <p id="mensajeAdmin" class="mensaje"></p>

        <!-- Elementos para mostrar la versión del HTML y del script -->
        <p id="htmlVersion" class="version-info"></p>
        <p id="scriptVersion" class="version-info"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
