<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol 5 - Registrar Resultados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Registrar Resultados de Partido</h1>
        <p>
            <a href="index.html">Ir a Crear Partido</a> |
            <a href="puntuaciones.html">Ver Tabla de Puntos</a> |
            <a href="administrador.html">Administrar Partidos</a> |
            <a href="chamigo.html">Votar Chamigo</a> <!-- Nuevo enlace -->
        </p>

        <label for="seleccionarPartido">Seleccionar Partido:</label>
        <select id="seleccionarPartido" onchange="mostrarDetallesPartido()">
            <!-- Las opciones de partidos se cargarán aquí dinámicamente -->
        </select>

        <h2>Detalles del Partido</h2>
        <div class="team-details-container">
            <div>
                <h3>Equipo Claros</h3>
                <textarea id="equipoClarosDetalle" rows="5" readonly></textarea>
            </div>
            <div>
                <h3>Equipo Oscuros</h3>
                <textarea id="equipoOscurosDetalle" rows="5" readonly></textarea>
            </div>
        </div>

        <h2>Resultado</h2>
        <input type="radio" id="ganaronClaros" name="ganador" value="Claros">
        <label for="ganaronClaros">Ganaron Claros</label><br>
        <input type="radio" id="ganaronOscuros" name="ganador" value="Oscuros">
        <label for="ganaronOscuros">Ganaron Oscuros</label><br>
        <input type="radio" id="empate" name="ganador" value="Empate">
        <label for="empate">Empate</label><br>

        <button onclick="registrarResultado()">Registrar Resultado y Actualizar Puntos</button>
        <p id="mensajeResultados" class="mensaje"></p>
    </div>

    <script src="script.js"></script>
    <div id="appVersion" class="app-version">v0.5</div> <!-- Versión de la APP -->
    <div id="scriptVersion" class="script-version"></div>
</body>
</html>
