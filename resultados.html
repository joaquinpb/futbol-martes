<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol 5 - Registrar Resultados</title>
    <!-- Enlaza el archivo de estilos CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Registrar Resultados de Partido</h1>
        <!-- Enlace para navegar a la página de creación de partidos -->
        <p><a href="index.html">Ir a Crear Partido</a></p>

        <label for="seleccionarPartido">Seleccionar Partido:</label>
        <!-- Lista desplegable para seleccionar un partido pendiente de resultado -->
        <select id="seleccionarPartido">
            <!-- Las opciones de partidos se cargarán aquí dinámicamente -->
        </select>

        <h2>Resultado</h2>
        <!-- Opciones de radio para seleccionar el equipo ganador o empate -->
        <input type="radio" id="ganaronClaros" name="ganador" value="Claros">
        <label for="ganaronClaros">Ganaron Claros</label><br>
        <input type="radio" id="ganaronOscuros" name="ganador" value="Oscuros">
        <label for="ganaronOscuros">Ganaron Oscuros</label><br>
        <input type="radio" id="empate" name="ganador" value="Empate">
        <label for="empate">Empate</label><br>

        <!-- Botón para registrar el resultado y actualizar los puntos de los jugadores -->
        <button onclick="registrarResultado()">Registrar Resultado y Actualizar Puntos</button>
        <!-- Área para mostrar mensajes al usuario (éxito/error) -->
        <p id="mensajeResultados" class="mensaje"></p>
    </div>

    <!-- Enlaza el archivo JavaScript principal.
         Toda la lógica de inicialización ahora está dentro de script.js. -->
    <script src="script.js"></script>
</body>
</html>
