<!DOCTYPE html>
<html lang="es" data-version="1.1">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol 5 - Registrar Resultados</title>
    <!-- Enlaza el archivo de estilos CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Registrar Resultados de Partido</h1>
        <!-- Enlaces de navegación -->
        <p>
            <a href="index.html">Ir a Crear Partido</a> |
            <a href="puntuaciones.html">Ir a Tabla de Puntos</a> |
            <a href="administrador.html">Ir a Administrador</a> |
            <a href="chamigo.html">Ir a Votar Chamigo</a>
        </p>

        <label for="seleccionarPartido">Seleccionar Partido:</label>
        <!-- Lista desplegable para seleccionar un partido pendiente de resultado -->
        <select id="seleccionarPartido" onchange="mostrarDetallesPartido()">
            <!-- Las opciones de partidos se cargarán aquí dinámicamente -->
        </select>

        <div class="team-details-container">
            <div>
                <h3>Equipo Claros</h3>
                <!-- Campo de texto para mostrar los jugadores del equipo Claros -->
                <textarea id="equipoClarosDetalle" rows="5" readonly></textarea>
            </div>
            <div>
                <h3>Equipo Oscuros</h3>
                <!-- Campo de texto para mostrar los jugadores del equipo Oscuros -->
                <textarea id="equipoOscurosDetalle" rows="5" readonly></textarea>
            </div>
        </div>

        <h2>Resultado</h2>
        <div class="resultados-winner-options">
            <div class="radio-option">
                <input type="radio" id="ganaronClaros" name="ganador" value="Claros">
                <label for="ganaronClaros">Ganaron Claros</label>
            </div>
            <div class="radio-option">
                <input type="radio" id="ganaronOscuros" name="ganador" value="Oscuros">
                <label for="ganaronOscuros">Ganaron Oscuros</label>
            </div>
            <div class="radio-option">
                <input type="radio" id="empate" name="ganador" value="Empate">
                <label for="empate">Empate</label>
            </div>
        </div>

        <!-- Botón para registrar el resultado y actualizar los puntos de los jugadores -->
        <button onclick="registrarResultado()">Registrar Resultado y Actualizar Puntos</button>
        <!-- Área para mostrar mensajes al usuario (éxito/error) -->
        <p id="mensajeResultados" class="mensaje"></p>

        <!-- Elementos para mostrar la versión del HTML y del script -->
        <p id="htmlVersion" class="version-info"></p>
        <p id="scriptVersion" class="version-info"></p>
    </div>

    <!-- Enlaza el archivo JavaScript principal. -->
    <script src="script.js"></script>
</body>
</html>
