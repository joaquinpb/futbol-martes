<!DOCTYPE html>
<html lang="es" data-version="1.2">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Resultados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Registrar Resultados</h1>
        <nav>
            <ul>
                <li><a href="index.html">Crear Partido</a></li>
                <li><a href="resultados.html">Registrar Resultados</a></li>
                <li><a href="puntuaciones.html">Tabla de Puntos</a></li>
                <li><a href="chamigo.html">Votar Chamigo</a></li>
                <li><a href="administrador.html">Administrador</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="form-section">
            <div class="pending-matches-container">
                <h2>Partidos Pendientes de Asignar Resultado</h2>
                <div id="pendingMatchesList" class="pending-matches-list">
                    <!-- Los partidos pendientes se cargarán aquí -->
                </div>
                <div id="mensajeResultados" class="message"></div>
            </div>

            <div class="input-group">
                <label for="equipoClarosDetalle">Equipo Claros:</label>
                <textarea id="equipoClarosDetalle" rows="5" readonly></textarea>
            </div>
            <div class="input-group">
                <label for="equipoOscurosDetalle">Equipo Oscuros:</label>
                <textarea id="equipoOscurosDetalle" rows="5" readonly></textarea>
            </div>

            <div class="input-group">
                <label>Ganador:</label>
                <div class="radio-group">
                    <input type="radio" id="ganadorClaros" name="ganador" value="Claros">
                    <label for="ganadorClaros">Claros</label>

                    <input type="radio" id="ganadorOscuros" name="ganador" value="Oscuros">
                    <label for="ganadorOscuros">Oscuros</label>

                    <input type="radio" id="ganadorEmpate" name="ganador" value="Empate">
                    <label for="ganadorEmpate">Empate</label>
                </div>
            </div>

            <button onclick="registrarResultado()">Registrar Resultado</button>
        </section>
    </main>

    <footer>
        <div id="version-info">
            <span id="htmlVersion"></span> | <span id="scriptVersion"></span>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
