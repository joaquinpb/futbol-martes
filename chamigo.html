<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol 5 - Votar Chamigo</title>
    <!-- Enlaza el archivo de estilos CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Votar Chamigo del Partido</h1>
        <!-- Enlaces de navegación -->
        <p>
            <a href="index.html">Ir a Crear Partido</a> |
            <a href="resultados.html">Ir a Registrar Resultados</a> |
            <a href="puntuaciones.html">Ir a Tabla de Puntos</a> |
            <a href="administrador.html">Ir a Administrador</a>
        </p>

        <label for="seleccionarPartidoChamigo">Seleccionar Partido para Votar Chamigo:</label>
        <select id="seleccionarPartidoChamigo" onchange="cargarJugadoresDelPartidoParaChamigo()">
            <option value="">Selecciona un partido...</option>
            <!-- Los partidos se cargarán aquí dinámicamente -->
        </select>

        <div id="chamigoVoteForm" style="display: none;">
            <div id="chamigoPlayersContainer" class="chamigo-vote-items">
                <!-- Los jugadores y sus campos de voto se cargarán aquí dinámicamente -->
            </div>
            <button onclick="submitChamigoVotes()">Enviar Votos de Chamigo</button>
        </div>

        <p id="mensajeChamigo" class="mensaje"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
