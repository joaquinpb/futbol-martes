<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol 5 - Votar Chamigo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Votar Chamigo del Partido</h1>
        <p>
            <a href="index.html">Ir a Crear Partido</a> |
            <a href="resultados.html">Ir a Registrar Resultados</a> |
            <a href="puntuaciones.html">Ver Tabla de Puntos</a> |
            <a href="administrador.html">Administrar Partidos</a>
        </p>

        <label for="seleccionarPartidoChamigo">Seleccionar Partido:</label>
        <select id="seleccionarPartidoChamigo" onchange="cargarJugadoresDelPartidoParaChamigo()">
            <option value="">Selecciona un partido...</option>
        </select>

        <form id="chamigoVoteForm" style="display: none;">
            <div id="chamigoPlayersContainer">
                <!-- Los campos de votación para los jugadores se cargarán aquí -->
            </div>
            <button type="button" onclick="submitChamigoVotes()">Votar Chamigo</button>
        </form>

        <p id="mensajeChamigo" class="mensaje"></p>
    </div>

    <script src="script.js"></script>
    <div id="appVersion" class="app-version">v0.1</div> <!-- Versión de la APP -->
    <div id="scriptVersion" class="script-version"></div>
</body>
</html>
