<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol 5 - Crear Partido</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Crear Partido de Futbol 5</h1>
        <p><a href="resultados.html">Ir a Registrar Resultados</a></p>

        <label for="fechaPartido">Fecha del Partido:</label>
        <input type="date" id="fechaPartido" value="" required>

        <h2>Jugadores Disponibles</h2>
        <select id="jugadoresDisponibles" multiple size="10">
            </select>
        <button onclick="moverJugadores('claros')">Mover a Claros</button>
        <button onclick="moverJugadores('oscuros')">Mover a Oscuros</button>

        <div class="equipos-container">
            <div>
                <h3>Equipo Claros (5)</h3>
                <select id="equipoClaros" multiple size="5"></select>
            </div>
            <div>
                <h3>Equipo Oscuros (5)</h3>
                <select id="equipoOscuros" multiple size="5"></select>
            </div>
        </div>

        <button onclick="guardarPartido()">Guardar Partido</button>
        <p id="mensaje" class="mensaje"></p>
    </div>

    <script src="script.js"></script>
    <script>
        // Establece la URL de tu Apps Script aquí
        const SCRIPT_URL = 'URL_DE_TU_APPS_SCRIPT_AQUI'; // ¡CAMBIA ESTO!
        document.addEventListener('DOMContentLoaded', cargarJugadores);
        document.getElementById('fechaPartido').valueAsDate = new Date(); // Establece la fecha actual
    </script>
</body>
</html>
