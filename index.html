<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol 5 - Crear Partido</title>
    <!-- Enlaza el archivo de estilos CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Crear Partido de Futbol 5</h1>
        <!-- Enlace para navegar a la página de registro de resultados -->
        <p><a href="resultados.html">Ir a Registrar Resultados</a></p>

        <label for="fechaPartido">Fecha del Partido:</label>
        <!-- Campo para seleccionar la fecha del partido -->
        <input type="date" id="fechaPartido" value="" required>

        <h2>Jugadores Disponibles</h2>
        <!-- Lista de jugadores disponibles, se llenará con JavaScript -->
        <select id="jugadoresDisponibles" multiple size="10">
            <!-- Las opciones de jugadores se cargarán aquí dinámicamente -->
        </select>
        <!-- Botones para mover jugadores a los equipos Claros u Oscuros -->
        <button onclick="moverJugadores('claros')">Mover a Claros</button>
        <button onclick="moverJugadores('oscuros')">Mover a Oscuros</button>

        <div class="equipos-container">
            <div>
                <h3>Equipo Claros (5)</h3>
                <!-- Lista para el equipo Claros -->
                <select id="equipoClaros" multiple size="5"></select>
            </div>
            <div>
                <h3>Equipo Oscuros (5)</h3>
                <!-- Lista para el equipo Oscuros -->
                <select id="equipoOscuros" multiple size="5"></select>
            </div>
        </div>

        <!-- Botón para guardar la configuración del partido -->
        <button onclick="guardarPartido()">Guardar Partido</button>
        <!-- Área para mostrar mensajes al usuario (éxito/error) -->
        <p id="mensaje" class="mensaje"></p>
    </div>

    <!-- Enlaza el archivo JavaScript principal.
         Ahora, toda la lógica de inicialización y la SCRIPT_URL están en script.js -->
    <script src="script.js"></script>
</body>
</html>
