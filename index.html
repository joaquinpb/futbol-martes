<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol 5 - Crear Partido</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Crear Partido de Futbol 5</h1>
        <p><a href="resultados.html">Ir a Registrar Resultados</a></p>

        <label for="fechaPartido">Fecha del Partido:</label>
        <input type="date" id="fechaPartido" value="" required>

        <div class="player-roles-section">
            <div class="list-column">
                <h2>Jugadores Titulares</h2>
                <select id="jugadoresTitulares" multiple size="15"></select>
                <button onclick="togglePlayerRole('titulares')">Mover a Suplentes</button>
                <button onclick="moveToTeam('titulares', 'claros')">Mover a Claros</button>
                <button onclick="moveToTeam('titulares', 'oscuros')">Mover a Oscuros</button>
            </div>

            <div class="list-column">
                <h2>Jugadores Suplentes</h2>
                <select id="jugadoresSuplentes" multiple size="15"></select>
                <button onclick="togglePlayerRole('suplentes')">Mover a Titulares</button>
                <button onclick="moveToTeam('suplentes', 'claros')">Mover a Claros</button>
                <button onclick="moveToTeam('suplentes', 'oscuros')">Mover a Oscuros</button>
            </div>
        </div>

        <h2>Armar Equipos</h2>
        <div class="equipos-container">
            <div>
                <h3>Equipo Claros (5)</h3>
                <select id="equipoClaros" multiple size="5"></select>
                <button onclick="moveFromTeam('claros')">Mover de Vuelta</button>
            </div>
            <div>
                <h3>Equipo Oscuros (5)</h3>
                <select id="equipoOscuros" multiple size="5"></select>
                <button onclick="moveFromTeam('oscuros')">Mover de Vuelta</button>
            </div>
        </div>

        <button onclick="guardarPartido()">Guardar Partido</button>
        <p id="mensaje" class="mensaje"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
