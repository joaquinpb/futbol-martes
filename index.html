<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol 5 - Crear Partido</title>
    <!-- Enlaza el archivo de estilos CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Crear Partido de Futbol 5</h1>
        <!-- Enlaces de navegación -->
        <p>
            <a href="resultados.html">Ir a Registrar Resultados</a> |
            <a href="puntuaciones.html">Ir a Tabla de Puntos</a> |
            <a href="administrador.html">Ir a Administrador</a> |
            <a href="chamigo.html">Ir a Votar Chamigo</a>
        </p>

        <label for="fechaPartido">Fecha del Partido:</label>
        <!-- Campo para seleccionar la fecha del partido -->
        <input type="date" id="fechaPartido" value="" required>

        <h2>Jugadores Disponibles</h2>
        <div class="player-lists-container">
            <div>
                <h3>Titulares</h3>
                <!-- Lista de jugadores titulares, se llenará con JavaScript -->
                <select id="jugadoresTitulares" multiple size="10"></select>
            </div>
            <div>
                <h3>Suplentes</h3>
                <!-- Lista de jugadores suplentes, se llenará con JavaScript -->
                <select id="jugadoresSuplentes" multiple size="10"></select>
            </div>
        </div>

        <!-- Botones para mover jugadores a los equipos Claros u Oscuros -->
        <button onclick="moveToTeam('titulares', 'claros')">Mover Titulares a Claros</button>
        <button onclick="moveToTeam('suplentes', 'claros')">Mover Suplentes a Claros</button>
        <button onclick="moveToTeam('titulares', 'oscuros')">Mover Titulares a Oscuros</button>
        <button onclick="moveToTeam('suplentes', 'oscuros')">Mover Suplentes a Oscuros</button>

        <div class="equipos-container">
            <div>
                <h3>Equipo Claros (5) <button onclick="moveFromTeam('claros')" class="small-button">Devolver</button></h3>
                <!-- Lista para el equipo Claros -->
                <select id="equipoClaros" multiple size="5"></select>
            </div>
            <div>
                <h3>Equipo Oscuros (5) <button onclick="moveFromTeam('oscuros')" class="small-button">Devolver</button></h3>
                <!-- Lista para el equipo Oscuros -->
                <select id="equipoOscuros" multiple size="5"></select>
            </div>
        </div>

        <!-- Botón para guardar la configuración del partido -->
        <button onclick="guardarPartido()">Guardar Partido</button>
        <!-- Área para mostrar mensajes al usuario (éxito/error) -->
        <p id="mensaje" class="mensaje"></p>
    </div>

    <!-- Enlaza el archivo JavaScript principal. -->
    <script src="script.js"></script>
</body>
</html>
