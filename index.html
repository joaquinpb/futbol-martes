<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol 5 - Crear Partido</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Crear Partido de Futbol 5</h1>
        <p><a href="resultados.html">Ir a Registrar Resultados</a></p>

        <label for="fechaPartido">Fecha del Partido:</label>
        <input type="date" id="fechaPartido" value="" required>

        <div class="player-selection-section">
            <div class="list-column">
                <h2>Jugadores Titulares</h2>
                <select id="jugadoresTitulares" multiple size="15"></select>
                <!-- Botón para mover jugadores de Titulares a Jugadores del Partido -->
                <button onclick="transferPlayers('jugadoresTitulares', 'jugadoresPartido', 10)">Mover a Partido</button>
            </div>

            <div class="list-column">
                <h2>Jugadores Suplentes</h2>
                <select id="jugadoresSuplentes" multiple size="15"></select>
                <!-- Botón para mover jugadores de Suplentes a Jugadores del Partido -->
                <button onclick="transferPlayers('jugadoresSuplentes', 'jugadoresPartido', 10)">Mover a Partido</button>
            </div>

            <div class="list-column">
                <h2>Jugadores del Partido (10)</h2>
                <select id="jugadoresPartido" multiple size="10"></select>
                <!-- Botones para mover jugadores de Jugadores del Partido de vuelta a Titulares/Suplentes -->
                <button onclick="transferPlayers('jugadoresPartido', 'jugadoresTitulares')">Mover a Titulares</button>
                <button onclick="transferPlayers('jugadoresPartido', 'jugadoresSuplentes')">Mover a Suplentes</button>
            </div>
        </div>

        <h2>Armar Equipos (desde Jugadores del Partido)</h2>
        <div class="equipos-container">
            <div>
                <h3>Equipo Claros (5)</h3>
                <select id="equipoClaros" multiple size="5"></select>
                <!-- Botón para mover jugadores de Jugadores del Partido a Equipo Claros -->
                <button onclick="transferPlayers('jugadoresPartido', 'equipoClaros', 5)">Mover a Claros</button>
            </div>
            <div>
                <h3>Equipo Oscuros (5)</h3>
                <select id="equipoOscuros" multiple size="5"></select>
                <!-- Botón para mover jugadores de Jugadores del Partido a Equipo Oscuros -->
                <button onclick="transferPlayers('jugadoresPartido', 'equipoOscuros', 5)">Mover a Oscuros</button>
            </div>
        </div>

        <button onclick="guardarPartido()">Guardar Partido</button>
        <p id="mensaje" class="mensaje"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
